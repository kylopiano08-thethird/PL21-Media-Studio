<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PL21 · F1 Media Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="logo">
                <h1>PL21 · F1 Media Studio</h1>
                <div class="badge" id="data-ready-badge">loading data...</div>
            </div>
            <div class="data-status">
                <div class="status-item"><span class="status-dot"></span><span>Data</span><span class="status-value" id="driver-count">0</span></div>
                <div class="status-item"><span>🏁</span><span>Rounds</span><span class="status-value" id="round-count">0</span></div>
            </div>
        </header>

        <div class="graphic-tabs" id="graphic-tabs">
            <button class="graphic-tab active" data-tab="fastest">🏁 Fastest Lap</button>
            <button class="graphic-tab" data-tab="dotd">⭐ Driver of the Day</button>
            <button class="graphic-tab" data-tab="pole">⚡ Pole Position</button>
            <button class="graphic-tab" data-tab="winner">🏆 Winner</button>
            <button class="graphic-tab" data-tab="grid">🏎️ Starting Grid</button>
            <button class="graphic-tab" data-tab="weather">🌤️ Weather</button>
        </div>

        <div class="main-layout">
            <div class="control-panel" id="control-panel">
                <!-- dynamic per tab -->
            </div>
            <div class="preview-panel">
                <div class="preview-header">
                    <h3 id="preview-title">Preview · Fastest Lap</h3>
                    <div class="preview-actions">
                        <button class="preview-btn" id="download-png-btn">📸 Download PNG</button>
                        <button class="preview-btn" id="copy-btn">📋 Copy</button>
                    </div>
                </div>
                <div class="preview-area" id="preview-area">
                    <canvas id="unified-canvas" width="1000" height="220" class="canvas-landscape"></canvas>
                    <!-- Weather graphic renders directly to DOM, not canvas -->
                    <div id="weather-graphic-container" style="display: none; width: 100%;"></div>
                    <div id="grid-graphic-container" style="display: none; width: 100%;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- External libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <!-- Scripts -->
    <script src="js/data-loader.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/graphics/fastest-lap.js"></script>
    <script src="js/graphics/driver-of-the-day.js"></script>
    <script src="js/graphics/pole-position.js"></script>
    <script src="js/graphics/winner.js"></script>
    <script src="js/graphics/starting-grid.js"></script>
    <script src="js/graphics/weather.js"></script>
    <script src="js/graphics/index.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
