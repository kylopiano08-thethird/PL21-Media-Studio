<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PL21 · F1 Media Studio · Light Sweep</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0c;
            color: #fff;
            line-height: 1.5;
        }
        .app { max-width: 1600px; margin: 0 auto; padding: 24px; }
        .header {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(18,18,24,0.8); backdrop-filter: blur(10px);
            padding: 20px 28px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 24px;
        }
        .logo h1 {
            font-size: 28px; font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #a0a0a0 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .logo .badge { font-size: 13px; color: #888; margin-top: 4px; }
        .data-status {
            display: flex; gap: 24px; background: rgba(0,0,0,0.3);
            padding: 12px 24px; border-radius: 40px;
        }
        .status-item { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #aaa; }
        .status-dot { width: 8px; height: 8px; background: #28cd41; border-radius: 50%; }

        .graphic-tabs {
            display: flex; gap: 8px; margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 6px; border-radius: 40px;
            width: fit-content;
        }
        .graphic-tab {
            padding: 12px 28px; border-radius: 40px; font-weight: 600; font-size: 15px;
            cursor: pointer; background: transparent; color: #aaa; border: none;
        }
        .graphic-tab.active { background: #e10600; color: white; }

        .main-layout { display: grid; grid-template-columns: 380px 1fr; gap: 24px; }
        .control-panel {
            background: rgba(18,18,24,0.8); backdrop-filter: blur(10px); border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.05); height: fit-content;
        }
        .panel-header { padding: 24px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .panel-header h2 { font-size: 18px; font-weight: 600; color: #ffd800; }
        .panel-header p { font-size: 13px; color: #666; }
        .form-section { padding: 24px; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; font-size: 12px; font-weight: 600; color: #888;
            text-transform: uppercase; margin-bottom: 8px;
        }
        .form-control, .form-select {
            width: 100%; padding: 14px 16px; background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; color: white;
            font-size: 14px; font-family: 'Inter', sans-serif;
        }
        .form-control:focus, .form-select:focus { outline: none; border-color: #e10600; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .range-slider { width: 100%; margin: 10px 0; }
        .range-slider input {
            width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px;
            -webkit-appearance: none;
        }
        .range-slider input::-webkit-slider-thumb {
            -webkit-appearance: none; width: 20px; height: 20px; background: #e10600;
            border-radius: 50%; cursor: pointer; border: 2px solid #ffd800;
        }
        .range-value { display: inline-block; margin-left: 10px; color: #ffd800; font-weight: 600; }
        .generate-btn {
            width: 100%; padding: 16px; border: none; border-radius: 40px; color: white;
            font-weight: 700; font-size: 16px; cursor: pointer; margin-top: 8px;
        }
        .generate-btn.fastest { background: linear-gradient(135deg, #5D3FD3, #2D1B4A); }
        .generate-btn.dotd { background: linear-gradient(135deg, #FFD700, #1E5BC6); }
        .generate-btn.pole { background: linear-gradient(135deg, #7F00FF, #5D3FD3); }
        .generate-btn.winner { background: linear-gradient(135deg, #e10600, #ff4d00); }

        .preview-panel {
            background: rgba(18,18,24,0.8); backdrop-filter: blur(10px); border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column;
        }
        .preview-header {
            padding: 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: space-between;
        }
        .preview-actions {
            display: flex;
            gap: 8px;
        }
        .preview-btn {
            padding: 8px 16px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            color: #ccc;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .preview-btn:hover {
            background: #5D3FD3;
            color: white;
            border-color: #5D3FD3;
        }
        .preview-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .preview-btn:disabled:hover {
            background: rgba(0,0,0,0.3);
            color: #ccc;
            border-color: rgba(255,255,255,0.05);
        }
        .recording-progress {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            color: #ffd800;
            display: none;
            z-index: 10;
        }

        .preview-area {
            flex: 1; padding: 40px; display: flex; align-items: center; justify-content: center;
            background: #0a0a0c; min-height: 550px; position: relative;
        }
        #unified-canvas {
            width: 100%; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .canvas-portrait { aspect-ratio: 3/4; max-width: 800px; }
        .canvas-landscape { aspect-ratio: 1000/220; max-width: 1000px; }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="logo">
                <h1>PL21 · F1 Media Studio</h1>

    <!-- ========== DATA LOADER ========== -->
    <script>
        (function() {
            const SHEET_ID = '1ECRV_5PiAFGBx9lfgKU_ZYdRSgUG4OpTEm9YzrxBvMI';
            
            function parseCSV(csv) {
                const lines = csv.split('\n').filter(l => l.trim());
                if (lines.length < 2) return [];
                
                const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim());
                const rows = [];
                
                for (let i = 1; i < lines.length; i++) {
                    const values = lines[i].split(',').map(v => v.replace(/"/g, '').trim());
                    const row = {};
                    headers.forEach((header, index) => {
                        row[header] = values[index] || '';
                    });
                    rows.push(row);
                }
                return rows;
            }

            async function fetchSheetCSV(sheetName) {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}&t=${Date.now()}`;
                try {
                    const res = await fetch(url);
                    const csv = await res.text();
                    return parseCSV(csv);
                } catch (e) {
                    console.warn(`Failed to load ${sheetName}`, e);
                    return [];
                }
            }

            // Fallback colors
            const fallbackColors = {
                'Red Bull': { primary: '#1E5BC6', secondary: '#FF1E1E' },
                'Ferrari': { primary: '#ED1C24', secondary: '#FFD800' },
                'Mercedes': { primary: '#6CD3BF', secondary: '#00A0E0' },
                'McLaren': { primary: '#F58020', secondary: '#1E3F6E' },
                'Alpine': { primary: '#2293D1', secondary: '#FF69B4' },
                'Alpha Tauri': { primary: '#4E7C9B', secondary: '#B22222' },
                'Haas': { primary: '#B6BABD', secondary: '#D52B1E' },
                'Alfa Romeo': { primary: '#B12039', secondary: '#8B8C8D' },
                'Williams': { primary: '#37BEDD', secondary: '#041E42' },
                'Aston Martin': { primary: '#2D826D', secondary: '#B6FF3A' },
                'Unknown': { primary: '#888888', secondary: '#AAAAAA' }
            };

            window.PL21_DATA = { 
                drivers: [], 
                raceRounds: [], 
                sprintRounds: [], 
                teamColors: {},
                
                getDriverTeamForRound: function(driver, roundNum) {
                    if (!driver || !roundNum) return driver?.defaultTeam || 'Unknown';
                    if (driver.movement && driver.movement[`round${roundNum}`]) {
                        return driver.movement[`round${roundNum}`];
                    }
                    if (driver.movement) {
                        for (let r = roundNum - 1; r >= 1; r--) {
                            if (driver.movement[`round${r}`]) {
                                return driver.movement[`round${r}`];
                            }
                        }
                    }
                    return driver.defaultTeam || 'Unknown';
                },
                
                getTeamColors: function(team) {
                    return this.teamColors[team] || fallbackColors[team] || fallbackColors.Unknown;
                }
            };

            async function loadAllData() {
                console.log('Loading data...');
                
                // Load Team Master
                const teamSheet = await fetchSheetCSV('Team Master');
                
                if (teamSheet && teamSheet.length > 0) {
                    teamSheet.forEach((row) => {
                        const teamName = row['Team Name'] || row['Team'] || '';
                        const primary = row['Primary Color'] || row['Primary'] || '';
                        const secondary = row['Secondary Color'] || row['Secondary'] || '';
                        
                        if (teamName && primary) {
                            window.PL21_DATA.teamColors[teamName] = {
                                primary: primary,
                                secondary: secondary || '#FFFFFF'
                            };
                        }
                    });
                }

                // Load Calendar
                const calendarSheet = await fetchSheetCSV('Calendar');
                const raceRounds = [];
                const sprintRounds = [];
                
                if (calendarSheet.length > 0) {
                    const headerRow = calendarSheet[0];
                    Object.keys(headerRow).forEach(key => {
                        if (key === 'Round Date') return;
                        const roundMatch = key.match(/Round (\d+)/i);
                        if (!roundMatch) return;
                        const roundNum = parseInt(roundMatch[1]);
                        let gpName = key.replace(/Round \d+.*$/, '').trim();
                        
                        const roundObj = { round: `Round ${roundNum}`, gp: gpName, roundNum };
                        
                        const sprintRow = calendarSheet[2];
                        const isSprint = sprintRow && sprintRow[key] && sprintRow[key].toLowerCase().includes('yes');
                        
                        if (isSprint) {
                            roundObj.gp = gpName.includes('Sprint') ? gpName : gpName + ' Sprint';
                            sprintRounds.push(roundObj);
                        } else {
                            roundObj.gp = gpName.includes('Grand Prix') ? gpName : gpName + ' Grand Prix';
                            raceRounds.push(roundObj);
                        }
                    });
                }
                
                raceRounds.sort((a, b) => a.roundNum - b.roundNum);
                sprintRounds.sort((a, b) => a.roundNum - b.roundNum);

                // Load Driver Master
                const driverSheet = await fetchSheetCSV('Driver Master');
                const drivers = [];
                driverSheet.forEach((row) => {
                    const name = row['Driver'] || '';
                    if (!name) return;
                    drivers.push({
                        name: name,
                        number: row['Number'] || '0',
                        defaultTeam: row['Team'] || 'Unknown',
                        photo: row['Photo'] || '',
                        movement: {}
                    });
                });

                // Load Driver Movement
                const movementSheet = await fetchSheetCSV('Driver Movement');
                movementSheet.forEach((row) => {
                    const driverName = row['Driver'] || '';
                    if (!driverName) return;
                    const movement = {};
                    for (let r = 1; r <= 13; r++) {
                        movement[`round${r}`] = row[`Round ${r}`] || '';
                    }
                    const driver = drivers.find(d => d.name === driverName);
                    if (driver) driver.movement = movement;
                });

                window.PL21_DATA.drivers = drivers;
                window.PL21_DATA.raceRounds = raceRounds;
                window.PL21_DATA.sprintRounds = sprintRounds;
                
                document.getElementById('driver-count').textContent = drivers.length;
                document.getElementById('round-count').textContent = raceRounds.length + sprintRounds.length;
                document.getElementById('data-ready-badge').textContent = `loaded · ${drivers.length} drivers, ${raceRounds.length} races, ${sprintRounds.length} sprints`;
                
                window.dispatchEvent(new CustomEvent('pl21-data-ready'));
            }

            loadAllData();
        })();
    </script>

    <!-- ========== COMPLETE ANIMATED GRAPHICS ========== -->
    <script>
        (function() {
            const canvas = document.getElementById('unified-canvas');
            let ctx = canvas.getContext('2d', { willReadFrequently: true });
            let currentTab = 'fastest';
            let phase = 0;
            let animationFrame = null;
            let imageCache = {};
            
            // Light sweep animation state
            const PHASE_SWEEP = 0;
            const PHASE_FADE = 1;
            const PHASE_RED = 2;
            
            let lightPhase = PHASE_SWEEP;
            let lightTimer = 0;
            
            // Timing (60fps)
            const SWEEP_FRAMES = 720;  // 12 seconds
            const FADE_FRAMES = 60;     // 1 second
            const RED_FRAMES = 240;     // 4 seconds
            const TOTAL_FRAMES = SWEEP_FRAMES + FADE_FRAMES + RED_FRAMES; // 1020 frames = 17 seconds
            
            // State
            let selectedDriver = null;
            let selectedRound = null;
            let lapTime = '1:27.345';
            let intensity = 100;
            let startPos = 'P10', finishPos = 'P3', votePercent = '43%', voteCount = '124,567 votes';
            let qualifyingTime = '1:26.345';
            let driverSize = 85;

            const controlPanel = document.getElementById('control-panel');
            const previewTitle = document.getElementById('preview-title');
            const downloadPngBtn = document.getElementById('download-png-btn');
            const downloadWebmBtn = document.getElementById('download-webm-btn');
            const copyBtn = document.getElementById('copy-btn');
            const recordingProgress = document.getElementById('recording-progress');

            // Animation loop
            function startAnimation() {
                function animate() {
                    phase += 0.002;
                    lightTimer++;
                    
                    // Update light phase
                    if (lightPhase === PHASE_SWEEP && lightTimer >= SWEEP_FRAMES) {
                        lightPhase = PHASE_FADE;
                        lightTimer = 0;
                    } else if (lightPhase === PHASE_FADE && lightTimer >= FADE_FRAMES) {
                        lightPhase = PHASE_RED;
                        lightTimer = 0;
                    } else if (lightPhase === PHASE_RED && lightTimer >= RED_FRAMES) {
                        lightPhase = PHASE_SWEEP;
                        lightTimer = 0;
                    }
                    
                    if (selectedDriver && selectedRound !== null) {
                        updatePreview();
                    }
                    animationFrame = requestAnimationFrame(animate);
                }
                animate();
            }

            // Helper: load image with cache
            async function loadImage(url) {
                if (!url) return null;
                if (imageCache[url]) return imageCache[url];
                
                return new Promise((res) => {
                    const img = new Image();
                    img.crossOrigin = 'anonymous';
                    img.onload = () => {
                        imageCache[url] = img;
                        res(img);
                    };
                    img.onerror = () => {
                        imageCache[url] = null;
                        res(null);
                    };
                    img.src = url;
                });
            }

            // Helper: generate darker version of a color
            function darkenColor(hex, percent) {
                if (!hex || hex === '#000000') return '#333333';
                hex = hex.replace('#', '');
                let r = parseInt(hex.substring(0, 2), 16);
                let g = parseInt(hex.substring(2, 4), 16);
                let b = parseInt(hex.substring(4, 6), 16);
                
                r = Math.max(0, Math.floor(r * (1 - percent)));
                g = Math.max(0, Math.floor(g * (1 - percent)));
                b = Math.max(0, Math.floor(b * (1 - percent)));
                
                return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
            }

            // Helper: generate lighter version of a color
            function lightenColor(hex, percent) {
                if (!hex || hex === '#000000') return '#666666';
                hex = hex.replace('#', '');
                let r = parseInt(hex.substring(0, 2), 16);
                let g = parseInt(hex.substring(2, 4), 16);
                let b = parseInt(hex.substring(4, 6), 16);
                
                r = Math.min(255, Math.floor(r + (255 - r) * percent));
                g = Math.min(255, Math.floor(g + (255 - g) * percent));
                b = Math.min(255, Math.floor(b + (255 - b) * percent));
                
                return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
            }

            // Helper: get color palette
            function getColorPalette(teamColors) {
                return {
                    primary: teamColors.primary,
                    secondary: teamColors.secondary,
                    light: lightenColor(teamColors.primary, 0.3),
                    dark: darkenColor(teamColors.primary, 0.3)
                };
            }

            // Helper: dynamic font size
            function getDynamicFontSize(text, maxWidth, baseSize, minSize = 14) {
                let fontSize = baseSize;
                ctx.font = `bold ${fontSize}px Inter`;
                let metrics = ctx.measureText(text);
                while (metrics.width > maxWidth && fontSize > minSize) {
                    fontSize -= 2;
                    ctx.font = `bold ${fontSize}px Inter`;
                    metrics = ctx.measureText(text);
                }
                return fontSize;
            }

            // Helper: dynamic font size for driver name
            function getDriverNameFontSize(name, maxWidth, panelX) {
                let fontSize = 64;
                ctx.font = `bold ${fontSize}px Inter`;
                let metrics = ctx.measureText(name);
                const nameEndX = 70 + metrics.width;
                
                while ((nameEndX > panelX - 20 || metrics.width > maxWidth) && fontSize > 30) {
                    fontSize -= 2;
                    ctx.font = `bold ${fontSize}px Inter`;
                    metrics = ctx.measureText(name);
                    const newNameEndX = 70 + metrics.width;
                    if (newNameEndX <= panelX - 20 && metrics.width <= maxWidth) break;
                }
                
                return fontSize;
            }

            // Helper: create light sweep gradient
            function createAccentGradient(text, x, y, accentColor, primaryColor, textWidth) {
                let lightPos;
                let lightColor;
                let baseColor;
                
                if (lightPhase === PHASE_SWEEP) {
                    const sweepProgress = lightTimer / SWEEP_FRAMES;
                    lightPos = -1.0 + sweepProgress * 2.5;
                    baseColor = accentColor;
                    lightColor = primaryColor;
                } else if (lightPhase === PHASE_FADE) {
                    const fadeProgress = lightTimer / FADE_FRAMES;
                    lightPos = 1.5;
                    baseColor = accentColor;
                    
                    const r1 = parseInt(primaryColor.slice(1,3), 16);
                    const g1 = parseInt(primaryColor.slice(3,5), 16);
                    const b1 = parseInt(primaryColor.slice(5,7), 16);
                    
                    const r2 = parseInt(accentColor.slice(1,3), 16);
                    const g2 = parseInt(accentColor.slice(3,5), 16);
                    const b2 = parseInt(accentColor.slice(5,7), 16);
                    
                    const r = Math.round(r1 + (r2 - r1) * fadeProgress);
                    const g = Math.round(g1 + (g2 - g1) * fadeProgress);
                    const b = Math.round(b1 + (b2 - b1) * fadeProgress);
                    
                    lightColor = `rgb(${r}, ${g}, ${b})`;
                } else {
                    return null;
                }
                
                const angle = 0.79;
                const gradientWidth = textWidth * 3.0;
                const dx = Math.cos(angle) * gradientWidth/2;
                const dy = Math.sin(angle) * gradientWidth/2;
                
                const centerX = x + lightPos * textWidth * 0.8;
                const centerY = y;
                
                const gradient = ctx.createLinearGradient(
                    centerX - dx, centerY - dy,
                    centerX + dx, centerY + dy
                );
                
                gradient.addColorStop(0, baseColor);
                gradient.addColorStop(0.45, baseColor);
                gradient.addColorStop(0.48, lightColor);
                gradient.addColorStop(0.52, lightColor);
                gradient.addColorStop(0.55, baseColor);
                gradient.addColorStop(1, baseColor);
                
                return gradient;
            }

            // ========== FASTEST LAP ==========
            async function drawFastest() {
                const width = canvas.width, height = canvas.height;
                ctx.clearRect(0, 0, width, height);
                
                const driver = window.PL21_DATA?.drivers.find(d => d.name === selectedDriver);
                const round = window.PL21_DATA?.raceRounds[selectedRound];
                if (!driver || !round) {
                    ctx.fillStyle = '#fff';
                    ctx.font = '24px Inter';
                    ctx.fillText('Select driver and round', 300, 110);
                    return;
                }
                
                const roundNum = parseInt(round.round.replace(/\D/g, '')) || 1;
                const teamForRound = window.PL21_DATA.getDriverTeamForRound(driver, roundNum);
                const teamColors = window.PL21_DATA.getTeamColors(teamForRound);
                const colors = getColorPalette(teamColors);
                
                // 1. BACKGROUND GRADIENT
                const gradient = ctx.createRadialGradient(550, 110, 0, 550, 110, 500);
                gradient.addColorStop(0, colors.light);
                gradient.addColorStop(0.3, colors.primary);
                gradient.addColorStop(0.6, colors.dark);
                gradient.addColorStop(1, '#000');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, width, height);
                
                // 2. HEX PATTERN
                const hexOpacity = 0.15 + Math.sin(phase * 1.5) * 0.1;
                ctx.strokeStyle = colors.secondary + Math.floor(hexOpacity * 255).toString(16).padStart(2, '0');
                ctx.lineWidth = 1;
                
                const hexSize = 25;
                const hexHeight = hexSize * Math.sqrt(3);
                
                for (let row = -2; row < height / hexHeight + 2; row++) {
                    for (let col = -2; col < width / (hexSize * 1.5) + 2; col++) {
                        const x = col * hexSize * 1.5;
                        const y = row * hexHeight + (col % 2) * hexHeight / 2;
                        
                        if (y < height && y > 0 && x < width && x > 0) {
                            ctx.beginPath();
                            for (let i = 0; i < 6; i++) {
                                const angle = i * Math.PI / 3;
                                const hx = x + hexSize * Math.cos(angle);
                                const hy = y + hexSize * Math.sin(angle);
                                if (i === 0) ctx.moveTo(hx, hy);
                                else ctx.lineTo(hx, hy);
                            }
                            ctx.closePath();
                            ctx.stroke();
                        }
                    }
                }
                
                // 3. BACKGROUND NUMBER
                ctx.save();
                ctx.shadowColor = colors.secondary;
                ctx.shadowBlur = 30;
                ctx.font = '800 200px Inter, sans-serif';

            // ========== DRIVER OF THE DAY ==========
            async function drawDOTD() {
                const width = canvas.width, height = canvas.height;
                ctx.clearRect(0, 0, width, height);
                
                const driver = window.PL21_DATA?.drivers.find(d => d.name === selectedDriver);
                const round = window.PL21_DATA?.raceRounds[selectedRound];
                if (!driver || !round) {
                    ctx.fillStyle = '#fff';
                    ctx.font = '24px Inter';
                    ctx.fillText('Select driver and round', 200, 500);
                    return;
                }
                
                const roundNum = parseInt(round.round.replace(/\D/g, '')) || 1;
                const teamForRound = window.PL21_DATA.getDriverTeamForRound(driver, roundNum);
                const teamColors = window.PL21_DATA.getTeamColors(teamForRound);
                const colors = getColorPalette(teamColors);
                
                // ===== BACKGROUND LAYER =====
                // 1. Main gradient
                const gradient = ctx.createLinearGradient(0, 0, width, height);
                gradient.addColorStop(0, colors.primary);
                gradient.addColorStop(0.4, colors.light);
                gradient.addColorStop(0.8, colors.dark);
                gradient.addColorStop(1, '#000');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, width, height);
                
                // 2. Hex pattern
                ctx.strokeStyle = colors.secondary + '30';
                ctx.lineWidth = 1;
                const hexSize = 35;
                const hexHeight = hexSize * Math.sqrt(3);
                for (let row = -2; row < height / hexHeight + 2; row++) {
                    for (let col = -2; col < width / (hexSize * 1.5) + 2; col++) {
                        const x = col * hexSize * 1.5;
                        const y = row * hexHeight + (col % 2) * hexHeight / 2;
                        ctx.beginPath();
                        for (let i = 0; i < 6; i++) {
                            const angle = i * Math.PI / 3;
                            const hx = x + hexSize * Math.cos(angle);
                            const hy = y + hexSize * Math.sin(angle);
                            i === 0 ? ctx.moveTo(hx, hy) : ctx.lineTo(hx, hy);
                        }
                        ctx.closePath();
                        ctx.stroke();
                    }
                }
                
                // 3. Depth overlay
                const depthGradient = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, width);
                depthGradient.addColorStop(0, 'rgba(0,0,0,0)');
                depthGradient.addColorStop(0.5, 'rgba(0,0,0,0.1)');
                depthGradient.addColorStop(1, 'rgba(0,0,0,0.3)');
                ctx.fillStyle = depthGradient;
                ctx.fillRect(0, 0, width, height);
                
                // 4. Glow spots
                ctx.save();
                ctx.filter = 'blur(60px)';
                ctx.globalAlpha = 0.15;
                
                ctx.fillStyle = colors.primary;
                ctx.beginPath(); ctx.arc(150, 250, 250, 0, Math.PI * 2); ctx.fill();
                
                ctx.fillStyle = colors.light;
                ctx.beginPath(); ctx.arc(650, 800, 300, 0, Math.PI * 2); ctx.fill();
                
                ctx.fillStyle = colors.secondary;
                ctx.beginPath(); ctx.arc(400, 500, 280, 0, Math.PI * 2); ctx.fill();
                
                ctx.restore();
                
                // 5. Top bar
                const barGradient = ctx.createLinearGradient(0, 0, width, 0);
                barGradient.addColorStop(0, colors.secondary);
                barGradient.addColorStop(0.5, colors.primary);
                barGradient.addColorStop(1, colors.secondary);
                ctx.fillStyle = barGradient;
                ctx.fillRect(0, 0, width, 8);
                
                // ===== MIDDLE LAYER =====
                // 6. Background number
                ctx.shadowColor = colors.secondary;
                ctx.shadowBlur = 30;
                ctx.font = '800 500px Inter, sans-serif';
                ctx.fillStyle = colors.secondary + '18';
                const numberText = '#' + driver.number;
                const numberWidth = ctx.measureText(numberText).width;
                ctx.fillText(numberText, width - numberWidth - 40, 400);
                ctx.shadowBlur = 0;
                
                // 7. Driver photo
                if (driver.photo) {
                    const img = await loadImage(driver.photo);
                    if (img) {
                        const driverSizeFactor = driverSize / 100;
                        
                        const targetHeight = 500 * driverSizeFactor;
                        const targetWidth = 400 * driverSizeFactor;
                        
                        const aspectRatio = img.width / img.height;
                        
                        let drawWidth, drawHeight;
                        
                        drawHeight = targetHeight;
                        drawWidth = drawHeight * aspectRatio;
                        
                        if (drawWidth > targetWidth) {
                            drawWidth = targetWidth;
                            drawHeight = drawWidth / aspectRatio;
                        }
                        
                        const photoX = (width - drawWidth) / 2 - 30;
                        const photoY = (height - drawHeight) / 2 + 20;
                        
                        ctx.shadowColor = colors.secondary;
                        ctx.shadowBlur = 40;
                        ctx.drawImage(img, photoX, photoY, drawWidth, drawHeight);
                        ctx.shadowBlur = 0;
                    }
                }
                
                // 8. Diagonal corners
                // Top left
                ctx.fillStyle = colors.dark + 'EE';
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(500, 0);
                ctx.lineTo(0, 380);
                ctx.closePath();
                ctx.fill();
                
                // Top edge line
                ctx.strokeStyle = colors.secondary + '90';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(500, 0);
                ctx.lineTo(0, 380);
                ctx.stroke();
                
                // Bottom right

                ctx.beginPath();
                ctx.moveTo(width, height);
                ctx.lineTo(180, height);
                ctx.lineTo(width, 450);

                ctx.fill();
                
                // Bottom edge line

                ctx.lineWidth = 3;

                ctx.lineTo(width, 450);

                // ===== TOP LAYER - TEXT =====

                ctx.fillText(round.round, 40, 60);
                
                ctx.font = 'bold 42px Inter, sans-serif';

                const gpParts = round.gp.split(' ');
                if (gpParts.length > 2) {
                    ctx.fillText(gpParts[0].toUpperCase(), 40, 115);

                    ctx.fillText(gpParts.slice(1).join(' ').toUpperCase(), 40, 155);
                } else {

                }
                
                // DOTD text - with sweep
                ctx.save();
                ctx.shadowColor = colors.dark;
                ctx.shadowBlur = 15;
                ctx.shadowOffsetX = 3;

                ctx.font = '800 55px Inter, sans-serif';

                ctx.fillStyle = gradient1 || colors.secondary;
                ctx.fillText('DRIVER OF', 40, 560);
                
                ctx.font = '800 75px Inter, sans-serif';

                // Stats

                const teamColors = window.PL21_DATA.getTeamColors(teamForRound);
                const colors = getColorPalette(teamColors);

                const gradient2 = ctx.createLinearGradient(0, 0, 0, height);

                gradient2.addColorStop(1, 'rgba(0,0,0,0.2)');
                ctx.fillStyle = gradient2;
                ctx.fillRect(0, 0, width, height);
                
                // 3. CARBON BASE
                const carbonY = height * 0.75;
                
                for (let y = carbonY; y < height; y += 4) {

                        if ((x + y) % 8 === 0) {
                            ctx.fillStyle = `rgba(40,40,50,0.2)`;
                            ctx.fillRect(x, y, 1, 1);
                        }
                    }
                }

                ctx.beginPath();
                ctx.moveTo(0, carbonY);
                ctx.lineTo(width, carbonY - 30);
                ctx.lineTo(width, height);
                ctx.lineTo(0, height);
                ctx.closePath();
                ctx.clip();
                
                ctx.fillStyle = colors.dark + '30';
                ctx.fillRect(0, carbonY, width, height - carbonY);
                ctx.restore();
                
                // 4. TOP BAR
                const barGradient = ctx.createLinearGradient(0, 0, width, 0);

                ctx.closePath();
                ctx.clip();
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                ctx.fillRect(0, carbonY, width, height - carbonY);
                ctx.restore();
                
                // 4. TOP BAR
                const barGradient = ctx.createLinearGradient(0, 0, width, 0);
                barGradient.addColorStop(0, colors.secondary);
                barGradient.addColorStop(1, colors.primary);
                ctx.fillStyle = barGradient;
                ctx.fillRect(0, 0, width, 6);
                
                // 5. BACKGROUND NUMBER
                ctx.font = '800 500px Inter, sans-serif';
                ctx.fillStyle = 'rgba(255,255,255,0.08)';
                const numberText = '#' + driver.number;
                const metrics = ctx.measureText(numberText);
                ctx.fillText(numberText, width - metrics.width - 20, 350);
                
                // 6. DRIVER PHOTO
                if (driver.photo) {
                    const img = await loadImage(driver.photo);
                    if (img) {
                        const driverSizeFactor = driverSize / 100;
                        const targetWidth = width * 0.5 * driverSizeFactor;
                        const aspectRatio = img.width / img.height;
                        const drawWidth = targetWidth;
                        const drawHeight = drawWidth / aspectRatio;
                        
                        const photoX = (width - drawWidth) / 2;
                        const photoY = (height - drawHeight) / 2 - 20;
                        
                        ctx.shadowColor = colors.secondary;
                        ctx.shadowBlur = 25;
                        ctx.drawImage(img, photoX, photoY, drawWidth, drawHeight);
                        ctx.shadowBlur = 0;
                    }
                }
                
                // 7. TEXT ELEMENTS
                ctx.font = 'bold 24px Inter, sans-serif';
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                ctx.fillText(round.round, 40, 50);
                
                ctx.font = 'bold 42px Inter, sans-serif';
                ctx.fillStyle = '#ffffff';
                ctx.fillText(round.gp.split(' ')[0].toUpperCase(), 40, 100);
                
                // 8. WINNER TEXT - with sweep
                ctx.save();
                ctx.font = '800 160px Inter, sans-serif';
                const textWidth = ctx.measureText('WINNER').width;
                const winnerGradient = createAccentGradient('WINNER', 40, height - 280, colors.secondary, colors.primary, textWidth);
                ctx.fillStyle = winnerGradient || colors.secondary;
                ctx.fillText('WINNER', 40, height - 280);
                ctx.restore();
                
                // 9. GOLD LINE WITH PULSE
                ctx.save();
                ctx.shadowColor = colors.secondary;
                ctx.shadowBlur = 12 + Math.sin(phase * 2) * 8;
                ctx.fillStyle = colors.secondary;
                ctx.fillRect(40, height - 150, 6, 60);
                ctx.restore();
                
                // 10. DRIVER NAME
                const nameSize = getDynamicFontSize(driver.name.toUpperCase(), 600, 64, 30);
                ctx.font = `bold ${nameSize}px Inter, sans-serif`;
                ctx.fillStyle = '#ffffff';
                ctx.fillText(driver.name.toUpperCase(), 70, height - 110);
                
                // 11. TEAM NAME
                ctx.font = '500 28px Inter, sans-serif';
                ctx.fillStyle = colors.light + '80';
                ctx.fillText(teamForRound.toUpperCase(), 70, height - 50);
            }

            // Update preview
            async function updatePreview() {
                if (!window.PL21_DATA?.drivers.length) return;
                
                if (currentTab === 'fastest') await drawFastest();
                else if (currentTab === 'dotd') await drawDOTD();
                else if (currentTab === 'pole') await drawPole();
                else if (currentTab === 'winner') await drawWinner();
            }

            // ========== PNG DOWNLOAD ==========
            function downloadAsPng() {
                if (!selectedDriver || selectedRound === null) {
                    alert('Please select a driver and round first');
                    return;
                }
                
                const link = document.createElement('a');
                link.download = `pl21_${currentTab}_${selectedDriver.replace(/\s+/g, '_')}_Round${selectedRound + 1}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            }

            // ========== COPY TO CLIPBOARD ==========
            async function copyToClipboard() {
                if (!selectedDriver || selectedRound === null) {
                    alert('Please select a driver and round first');
                    return;
                }
                
                try {
                    const blob = await new Promise(resolve => canvas.toBlob(resolve));
                    await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
                    alert('Image copied to clipboard!');
                } catch (err) {
                    alert('Failed to copy image');
                }
            }

            // ========== FIXED WEBM RECORDING ==========
            async function recordAsWebM() {
                if (!selectedDriver || selectedRound === null) {
                    alert('Please select a driver and round first');
                    return;
                }

                downloadWebmBtn.disabled = true;
                downloadWebmBtn.textContent = '🎞️ Recording...';
                recordingProgress.style.display = 'block';

                // Store original animation state
                const originalLightPhase = lightPhase;
                const originalLightTimer = lightTimer;
                const originalPhase = phase;

                try {
                    // Create a media stream from the canvas at 60fps to match animation
                    const stream = canvas.captureStream(60);
                    
                    // Set up media recorder with high quality settings
                    const mediaRecorder = new MediaRecorder(stream, {
                        mimeType: 'video/webm;codecs=vp9',
                        videoBitsPerSecond: 8000000 // 8 Mbps for best quality
                    });
                    
                    const chunks = [];
                    
                    mediaRecorder.ondataavailable = (e) => {
                        if (e.data.size > 0) {
                            chunks.push(e.data);
                        }
                    };
                    
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(chunks, { type: 'video/webm' });
                        const url = URL.createObjectURL(blob);
                        const link = document.createElement('a');
                        link.download = `pl21_${currentTab}_${selectedDriver.replace(/\s+/g, '_')}_Round${selectedRound + 1}.webm`;
                        link.href = url;
                        link.click();
                        URL.revokeObjectURL(url);
                        
                        downloadWebmBtn.disabled = false;
                        downloadWebmBtn.textContent = '🎞️ Download WebM';
                        recordingProgress.style.display = 'none';
                        
                        // Restore original animation state
                        lightPhase = originalLightPhase;
                        lightTimer = originalLightTimer;
                        phase = originalPhase;
                        updatePreview();
                    };
                    
                    // Start recording
                    mediaRecorder.start();
                    
                    // Calculate total frames and timing
                    const totalFrames = TOTAL_FRAMES;
                    const frameDuration = 1000 / 60; // 16.67ms per frame at 60fps
                    
                    // Update progress
                    const startTime = Date.now();
                    const progressInterval = setInterval(() => {
                        const elapsed = Date.now() - startTime;
                        const progress = Math.min(100, Math.round((elapsed / (totalFrames * frameDuration)) * 100));
                        recordingProgress.textContent = `Recording: ${progress}%`;
                        
                        if (progress >= 100) {
                            clearInterval(progressInterval);
                        }
                    }, 100);
                    
                    // Run through the animation at full speed
                    for (let frame = 0; frame < totalFrames; frame++) {
                        // Update animation state exactly as the real animation would
                        if (frame < SWEEP_FRAMES) {
                            lightPhase = PHASE_SWEEP;
                            lightTimer = frame;
                        } else if (frame < SWEEP_FRAMES + FADE_FRAMES) {
                            lightPhase = PHASE_FADE;
                            lightTimer = frame - SWEEP_FRAMES;
                        } else {
                            lightPhase = PHASE_RED;
                            lightTimer = frame - SWEEP_FRAMES - FADE_FRAMES;
                        }
                        
                        // Update phase for pulsing effects (matches the 0.002 increment per frame)
                        phase = frame * 0.002;
                        
                        // Render the frame
                        await updatePreview();
                        
                        // Wait exactly 16.67ms to maintain 60fps
                        await new Promise(resolve => setTimeout(resolve, frameDuration));
                    }
                    
                    // Stop recording
                    mediaRecorder.stop();
                    stream.getTracks().forEach(track => track.stop());
                    
                } catch (error) {
                    console.error('Recording failed:', error);
                    alert('Recording failed: ' + error.message);
                    
                    // Restore original animation state
                    lightPhase = originalLightPhase;
                    lightTimer = originalLightTimer;
                    phase = originalPhase;
                    await updatePreview();
                    
                    downloadWebmBtn.disabled = false;
                    downloadWebmBtn.textContent = '🎞️ Download WebM';
                    recordingProgress.style.display = 'none';
                }
            }

            // ========== BUILD FORM ==========
            function buildForm() {
                if (!window.PL21_DATA?.drivers.length) {
                    controlPanel.innerHTML = '<div class="panel-header"><h2>Loading data...</h2></div>';
                    return;
                }
                
                let html = `
                    <div class="panel-header">
                        <h2>${currentTab === 'fastest' ? 'Fastest Lap' : currentTab === 'dotd' ? 'Driver of the Day' : currentTab === 'pole' ? 'Pole Position' : 'Winner'}</h2>
                        <p>customize your graphic</p>
                    </div>
                    <div class="form-section">
                        <div class="form-group">
                            <label>Driver</label>
                            <select class="form-control" id="driver-select">
                                <option value="">Select driver...</option>
                                ${window.PL21_DATA.drivers.sort((a, b) => a.name.localeCompare(b.name)).map(d => 
                                    `<option value="${d.name}" ${d.name === selectedDriver ? 'selected' : ''}>${d.name} · #${d.number} · ${d.defaultTeam}</option>`
                                ).join('')}
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Round</label>
                            <select class="form-control" id="round-select">
                                <option value="">Select round...</option>
                                ${window.PL21_DATA.raceRounds.map((r, i) => 
                                    `<option value="${i}" ${selectedRound === i ? 'selected' : ''}>${r.round} · ${r.gp}</option>`
                                ).join('')}
                                ${window.PL21_DATA.sprintRounds.map((r, i) => 
                                    `<option value="${i + window.PL21_DATA.raceRounds.length}" ${selectedRound === i + window.PL21_DATA.raceRounds.length ? 'selected' : ''}>${r.round} · ${r.gp}</option>`
                                ).join('')}
                            </select>
                        </div>
                `;
                
                if (currentTab === 'fastest') {
                    html += `
                        <div class="form-group">
                            <label>Lap Time</label>
                            <input type="text" class="form-control" id="lap-time" value="${lapTime}">
                        </div>
                    `;
                } else if (currentTab === 'dotd') {
                    html += `
                        <div class="form-row">
                            <div class="form-group">
                                <label>Start Pos</label>
                                <input type="text" class="form-control" id="start-pos" value="${startPos}">
                            </div>
                            <div class="form-group">
                                <label>Finish Pos</label>
                                <input type="text" class="form-control" id="finish-pos" value="${finishPos}">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Vote Percentage</label>
                            <input type="text" class="form-control" id="vote-percent" value="${votePercent}">
                        </div>
                        <div class="form-group">
                            <label>Vote Count</label>
                            <input type="text" class="form-control" id="vote-count" value="${voteCount}">
                        </div>
                        <div class="form-group">
                            <label>Driver Size <span id="driver-size-value" class="range-value">${driverSize}%</span></label>
                            <div class="range-slider">
                                <input type="range" id="driver-size" min="50" max="300" value="${driverSize}" step="1">
                            </div>
                        </div>
                    `;
                } else if (currentTab === 'pole') {
                    html += `
                        <div class="form-group">
                            <label>Qualifying Time</label>
                            <input type="text" class="form-control" id="qualifying-time" value="${qualifyingTime}">
                        </div>
                        <div class="form-group">
                            <label>Driver Size <span id="driver-size-value" class="range-value">${driverSize}%</span></label>
                            <div class="range-slider">
                                <input type="range" id="driver-size" min="50" max="300" value="${driverSize}" step="1">
                            </div>
                        </div>
                    `;
                } else if (currentTab === 'winner') {
                    html += `
                        <div class="form-group">
                            <label>Driver Size <span id="driver-size-value" class="range-value">${driverSize}%</span></label>
                            <div class="range-slider">
                                <input type="range" id="driver-size" min="50" max="300" value="${driverSize}" step="1">
                            </div>
                        </div>
                    `;
                }
                
                html += `<button class="generate-btn ${currentTab}" id="generate-btn">Generate</button></div>`;
                controlPanel.innerHTML = html;

                // Event listeners
                document.getElementById('driver-select')?.addEventListener('change', (e) => {
                    selectedDriver = e.target.value;
                    updatePreview();
                });
                
                document.getElementById('round-select')?.addEventListener('change', (e) => {
                    selectedRound = parseInt(e.target.value);
                    updatePreview();
                });
                
                if (currentTab === 'fastest') {
                    document.getElementById('lap-time')?.addEventListener('input', (e) => {
                        lapTime = e.target.value;
                        updatePreview();
                    });
                } else if (currentTab === 'dotd') {
                    document.getElementById('start-pos')?.addEventListener('input', (e) => {
                        startPos = e.target.value;
                        updatePreview();
                    });
                    document.getElementById('finish-pos')?.addEventListener('input', (e) => {
                        finishPos = e.target.value;
                        updatePreview();
                    });
                    document.getElementById('vote-percent')?.addEventListener('input', (e) => {
                        votePercent = e.target.value;
                        updatePreview();
                    });
                    document.getElementById('vote-count')?.addEventListener('input', (e) => {
                        voteCount = e.target.value;
                        updatePreview();
                    });
                    document.getElementById('driver-size')?.addEventListener('input', (e) => {
                        driverSize = e.target.value;
                        document.getElementById('driver-size-value').textContent = driverSize + '%';
                        updatePreview();
                    });
                } else if (currentTab === 'pole') {
                    document.getElementById('qualifying-time')?.addEventListener('input', (e) => {
                        qualifyingTime = e.target.value;
                        updatePreview();
                    });
                    document.getElementById('driver-size')?.addEventListener('input', (e) => {
                        driverSize = e.target.value;
                        document.getElementById('driver-size-value').textContent = driverSize + '%';
                        updatePreview();
                    });
                } else if (currentTab === 'winner') {
                    document.getElementById('driver-size')?.addEventListener('input', (e) => {
                        driverSize = e.target.value;
                        document.getElementById('driver-size-value').textContent = driverSize + '%';
                        updatePreview();
                    });
                }
                
                document.getElementById('generate-btn')?.addEventListener('click', updatePreview);
            }

            // ========== TAB SWITCHING ==========
            document.querySelectorAll('.graphic-tab').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.graphic-tab').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentTab = btn.dataset.tab;
                    previewTitle.innerText = `Preview · ${btn.innerText}`;
                    
                    if (currentTab === 'fastest') {
                        canvas.width = 1000;
                        canvas.height = 220;
                        canvas.className = 'canvas-landscape';
                    } else {
                        canvas.width = 800;
                        canvas.height = 1067;
                        canvas.className = 'canvas-portrait';
                    }
                    ctx = canvas.getContext('2d', { willReadFrequently: true });
                    buildForm();
                    if (selectedDriver && selectedRound !== null) {
                        updatePreview();
                    }
                });
            });

            // ========== BUTTON EVENT LISTENERS ==========
            downloadPngBtn.addEventListener('click', downloadAsPng);
            downloadWebmBtn.addEventListener('click', recordAsWebM);
            copyBtn.addEventListener('click', copyToClipboard);

            // ========== INITIALIZE ==========
            window.addEventListener('pl21-data-ready', () => {
                buildForm();
                startAnimation();
            });
        })();
    </script>
</body>
</html>
